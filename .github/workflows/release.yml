name: Release

# Packages the extension and attaches the .vsix to a GitHub Release whenever a
# v* tag is pushed. Tag and manifest version must agree — the check below fails
# the build rather than shipping a .vsix whose filename lies about its contents.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix mcp

      # vsce runs vscode:prepublish (compile + bundle-mcp) itself, but doing it
      # here surfaces a TypeScript or bundling failure as its own failed step.
      - name: Compile and bundle
        run: |
          npm run compile
          npm run bundle-mcp

      - name: Check tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Package .vsix
        run: npx --yes @vscode/vsce package

      - name: Attach .vsix to the release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if the tag has none yet, then upload (clobbering
          # any same-named asset so re-runs are idempotent).
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
                 --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" ./*.vsix --clobber

      # Keeps the artifact available for manual-dispatch runs, which have no
      # release to attach to.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ./*.vsix
